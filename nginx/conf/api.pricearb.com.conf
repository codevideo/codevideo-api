server {
    listen 80;
    listen [::]:80;
    
    server_name api.pricearb.com www.api.pricearb.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.pricearb.com$request_uri;
    }
}

# This block can only be activated after the SSL certificate has been obtained!
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.pricearb.com;

    ssl_certificate /etc/nginx/ssl/live/api.pricearb.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.pricearb.com/privkey.pem;
    
    location / {
        # For host-based Go binary (not in Docker):
        # - On Linux: use 172.17.0.1:8080 (Docker bridge gateway)
        # - Or add --add-host=host.docker.internal:host-gateway to nginx container
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Set proxy timeout to 5 minutes (300 seconds)
        proxy_read_timeout 300s;
    }
}
