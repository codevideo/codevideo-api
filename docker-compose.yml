services:
  staging-codevideo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: staging-codevideo-api
    container_name: staging-codevideo-api
    ports:
      - "6999:6999"
    restart: always
    networks:
      - codevideo-network
    volumes:
      - ./tmp/v3/:/usr/src/app/tmp/v3/
    env_file: .env.staging
    # TTS_SERVICE_URL points at the self-hosted codevideo-tts service. To use it,
    # set CODEVIDEO_TTS_PROVIDER=kokoro in .env.staging (default stays elevenlabs).
    environment:
      - TTS_SERVICE_URL=http://codevideo-tts:3000
    depends_on:
      - codevideo-tts

  codevideo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: codevideo-api
    container_name: codevideo-api
    ports:
      - "7000:7000"
    restart: always
    networks:
      - codevideo-network
    volumes:
      - ./tmp/v3/:/usr/src/app/tmp/v3/
    env_file: .env
    # set CODEVIDEO_TTS_PROVIDER=kokoro in .env to switch this instance to the
    # self-hosted TTS service below (default stays elevenlabs until you flip it).
    environment:
      - TTS_SERVICE_URL=http://codevideo-tts:3000
    depends_on:
      - codevideo-tts

  gatsby-static-server:
    build:
      context: ./gatsby-static-server
      dockerfile: Dockerfile
    image: gatsby-static-server
    container_name: gatsby-static-server
    ports:
      - "7001:7001"
    restart: always
    networks:
      - codevideo-network
  
  languagetool:
    image: erikvl87/languagetool
    container_name: languagetool
    ports:
      - "8010:8010"
    restart: always
    networks:
      - codevideo-network

  # Self-hosted, vendor-free TTS (Kokoro, pure Node) — see ../codevideo-tts.
  # Reached by the API at http://codevideo-tts:3000 on the internal network.
  codevideo-tts:
    build:
      context: ../codevideo-tts
      dockerfile: Dockerfile
    image: codevideo-tts
    container_name: codevideo-tts
    restart: always
    networks:
      - codevideo-network
    volumes:
      # persist the ~300MB Kokoro model across restarts
      - codevideo-tts-models:/app/.hf-cache
    environment:
      - HF_HOME=/app/.hf-cache

  # Genie generation backend (LLM -> streamed CodeVideo actions). Sibling repo
  # ../codevideo-genie; nginx proxies /genie here. One port (3001) serves both
  # the HTTP trigger and the WebSocket stream. Create .env.genie with the LLM key
  # (GEMINI_API_KEY or ANTHROPIC_API_KEY) + CLERK_SECRET_KEY before bringing it up.
  codevideo-genie:
    build:
      context: ../codevideo-genie
      dockerfile: Dockerfile
    image: codevideo-genie
    container_name: codevideo-genie
    restart: always
    networks:
      - codevideo-network
    expose:
      - "3001"
    env_file: .env.genie
    environment:
      - NODE_ENV=production
      - GENIE_HTTP_PORT=3001
      - GENIE_TRUST_PROXY=1

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    restart: always
    networks:
      - codevideo-network
    depends_on:
      - codevideo-api
      - codevideo-genie
    volumes:
      - ./nginx/conf/:/etc/nginx/conf.d/:ro
      - ./certbot/www/:/var/www/certbot/:ro
      - ./certbot/conf/live/:/etc/nginx/ssl/live:ro
      - ./certbot/conf/archive/:/etc/nginx/ssl/archive:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw

networks:
  codevideo-network:
    driver: bridge

volumes:
  codevideo-tts-models: