services:
  staging-codevideo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: staging-codevideo-api
    container_name: staging-codevideo-api
    ports:
      - "6999:6999"
    restart: always
    networks:
      - codevideo-network
    volumes:
      - ./tmp/v3/:/usr/src/app/tmp/v3/
    env_file: .env.staging

  codevideo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: codevideo-api
    container_name: codevideo-api
    ports:
      - "7000:7000"
    restart: always
    networks:
      - codevideo-network
    volumes:
      - ./tmp/v3/:/usr/src/app/tmp/v3/
    env_file: .env

  gatsby-static-server:
    build:
      context: ./gatsby-static-server
      dockerfile: Dockerfile
    image: gatsby-static-server
    container_name: gatsby-static-server
    ports:
      - "7001:7001"
    restart: always
    networks:
      - codevideo-network
  
  languagetool:
    image: erikvl87/languagetool
    container_name: languagetool
    ports:
      - "8010:8010"
    restart: always
    networks:
      - codevideo-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    restart: always
    networks:
      - codevideo-network
    depends_on:
      - codevideo-api
    volumes:
      - ./nginx/conf/:/etc/nginx/conf.d/:ro
      - ./certbot/www/:/var/www/certbot/:ro
      - ./certbot/conf/live/:/etc/nginx/ssl/live:ro
      - ./certbot/conf/archive/:/etc/nginx/ssl/archive:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw

networks:
  codevideo-network:
    driver: bridge